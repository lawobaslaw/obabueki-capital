services:
  backend:
    build: ./backend
    # Maps your host User/Group IDs to the container to prevent permission lockouts
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/obabueki
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: obabueki
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ensures backend doesn't start until DB is completely ready to accept connections
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d obabueki"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
